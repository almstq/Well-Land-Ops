<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Open Well Land Local Ops</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#182230;margin:0;padding:36px}
    .box{max-width:720px;background:white;border:1px solid #d9e2ec;border-radius:10px;padding:22px;margin:auto}
    h1{margin-top:0}
    code{background:#eef2f7;padding:2px 6px;border-radius:4px}
    a{color:#155e75;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h1>Well Land Local Ops</h1>
    <p>This app needs the local server to be running.</p>
    <ol>
      <li>Double-click <code>START_WL_LOCAL_APP.cmd</code>.</li>
      <li>Keep the black server window open.</li>
      <li>Open or refresh <a href="http://127.0.0.1:8787">http://127.0.0.1:8787</a>.</li>
    </ol>
    <p>To stop the app, close the server window or run <code>STOP_WL_LOCAL_APP.cmd</code>.</p>
  </div>
</body>
</html>
