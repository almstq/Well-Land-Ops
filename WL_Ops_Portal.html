<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Well Land Ops Portal</title>
<style>
:root { color-scheme: light; --bg:#f6f7fa; --panel:#fff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#0b5cad; --accent2:#0f766e; --warn:#b45309; --crit:#b91c1c; --ok:#15803d; --chip:#eef2f7; }
*{box-sizing:border-box}
html,body{margin:0;padding:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:#0f172a;color:#e5e7eb;padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar h1{margin:0 0 4px;font-size:15px;letter-spacing:.3px;color:#fff}
.sidebar .sub{font-size:11px;color:#94a3b8;margin-bottom:18px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{background:transparent;border:0;color:#cbd5e1;text-align:left;padding:9px 10px;border-radius:6px;cursor:pointer;font:inherit;display:flex;justify-content:space-between;align-items:center}
.nav button:hover{background:#1e293b;color:#fff}
.nav button.active{background:#1e3a8a;color:#fff}
.nav .count{background:#334155;color:#cbd5e1;font-size:11px;padding:1px 7px;border-radius:10px}
.nav button.active .count{background:#3b82f6;color:#fff}
.nav .divider{height:1px;background:#1e293b;margin:8px 4px}
.sidebar .foot{margin-top:18px;font-size:11px;color:#64748b;line-height:1.4}
.main{padding:18px 22px 60px;max-width:100%;overflow-x:hidden}
.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.bar h2{margin:0;font-size:20px}
.bar .actions{display:flex;gap:8px;flex-wrap:wrap}
button.btn{background:var(--accent);color:#fff;border:0;padding:7px 12px;border-radius:6px;cursor:pointer;font:inherit}
button.btn:hover{background:#094786}
button.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
button.btn.ghost:hover{background:#f3f4f6}
button.btn.warn{background:var(--warn)}
button.btn.crit{background:var(--crit)}
input.search,select.search{padding:7px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;font:inherit;min-width:200px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:24px;font-weight:600;margin-top:4px}
.kpi .d{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.ok .v{color:var(--ok)} .kpi.warn .v{color:var(--warn)} .kpi.crit .v{color:var(--crit)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:900px){.grid2{grid-template-columns:1fr}.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
.card h3{margin:0 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:.4px;color:#374151}
.alerts li{margin:6px 0;padding:8px 10px;border-left:3px solid var(--warn);background:#fff7ed;border-radius:0 6px 6px 0;list-style:none;font-size:13px}
.alerts li.crit{border-color:var(--crit);background:#fef2f2}
.alerts li.ok{border-color:var(--ok);background:#f0fdf4}
.alerts ul{padding:0;margin:0}
.alerts .meta{color:var(--muted);font-size:11px;margin-top:2px}
.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
th{background:#f9fafb;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#4b5563;position:sticky;top:0;cursor:pointer;user-select:none}
th:hover{background:#f3f4f6}
tr:hover td{background:#f9fafb}
.row-actions{display:flex;gap:4px}
.row-actions button{font-size:11px;padding:3px 7px;border:1px solid var(--line);background:#fff;border-radius:4px;cursor:pointer}
.row-actions button.del{color:var(--crit);border-color:#fecaca}
.row-actions button:hover{background:#f3f4f6}
.chip{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;background:var(--chip);color:#374151;white-space:nowrap}
.chip.ok{background:#dcfce7;color:#166534}
.chip.warn{background:#fef3c7;color:#92400e}
.chip.crit{background:#fee2e2;color:#991b1b}
.chip.muted{background:#f1f5f9;color:#475569}
.empty{padding:30px;text-align:center;color:var(--muted)}
.tools{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:30px 16px;overflow-y:auto}
.modal.open{display:flex}
.modal-inner{background:#fff;border-radius:10px;max-width:680px;width:100%;padding:18px 20px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-inner h3{margin:0 0 12px;font-size:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.form-grid label{display:flex;flex-direction:column;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.form-grid input,.form-grid select,.form-grid textarea{padding:7px 9px;border:1px solid var(--line);border-radius:6px;font:inherit;color:var(--ink);background:#fff;margin-top:3px}
.form-grid textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.chart-wrap{position:relative;height:240px}
.mini-chart{display:flex;flex-direction:column;gap:8px;height:240px;overflow:auto;padding:4px 2px}
.mini-row{display:grid;grid-template-columns:minmax(80px,150px) 1fr 34px;gap:8px;align-items:center;font-size:12px}
.mini-row .bar-bg{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.mini-row .bar-fill{height:100%;background:var(--accent2);border-radius:99px}
.mini-row:nth-child(4n+1) .bar-fill{background:var(--accent)}
.mini-row:nth-child(4n+2) .bar-fill{background:var(--accent2)}
.mini-row:nth-child(4n+3) .bar-fill{background:var(--warn)}
.mini-row:nth-child(4n+4) .bar-fill{background:var(--crit)}
.toast{position:fixed;bottom:16px;right:16px;background:#111827;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;z-index:2000}
.toast.show{opacity:1;transform:none}
details.filters{background:#fff;border:1px solid var(--line);border-radius:6px;padding:6px 10px;margin-bottom:10px}
details.filters summary{cursor:pointer;font-size:12px;color:var(--muted)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.banner{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;color:#92400e}
.banner.crit{background:#fef2f2;border-color:#fecaca;color:#991b1b}
</style>
</head>

</div>

// ============= DATE HELPERS =============
function parseDate(s) {
  if (!s) return null;
  if (typeof s !== 'string') s = String(s);
  // DD/MM/YYYY
  let m = s.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  // YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(s); return isNaN(d) ? null : d;
}
function daysUntil(s) {
  const d = parseDate(s); if (!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}
function fmtDays(n) {
  if (n === null) return '';
  if (n < 0) return `${Math.abs(n)}d overdue`;
  if (n === 0) return 'today';
  return `${n}d`;
}

function liveSlot(key, live) {
  if (!key) return '';
  const chips = (...items) => `<div style="margin-top:6px">${items.filter(Boolean).join(' ')}</div>`;
  const list = (title, rows) => rows.length ? `<div style="margin-top:6px;font-size:12px"><strong>${esc(title)}</strong><ul style="margin:4px 0 0 16px;padding:0">${rows.map(x=>`<li>${x}</li>`).join('')}</ul></div>` : '';
  if (key === 'intel') {
    return chips(
      live.recoveryHigh.length ? `<span class="chip crit">${live.recoveryHigh.length} recovery blockers</span>` : '',
      live.openProc.length ? `<span class="chip warn">${live.openProc.length} procurement open</span>` : '',
      live.payQueue.length ? `<span class="chip crit">${live.payQueue.length} payment follow-up</span>` : '',
      live.expSoon14.length ? `<span class="chip warn">${live.expSoon14.length} expiring <=14d</span>` : ''
    );
  }
  if (key === 'plan') return list('Today must produce:', ['1 fleet decision/update', '1 procurement/RFQ movement', '1 finance/payment follow-up', '1 Horizon 1 system improvement']);
  if (key === 'sites') return list('Ask every site:', ['Machine status and hour/fuel readings', 'New phone/text PRs with photos/specs', 'Operator attendance and safety issues', 'Dispatch/collection needs today']);
  if (key === 'recovery') return list('High-priority blockers:', live.recoveryHigh.slice(0,5).map(r=>`${esc(r.ID)} - ${esc(r.Machine)}: ${esc(r['Pending Requirement'] || r.Issue)}`));
  if (key === 'procurement') return list('Move these to RFQ/spec verified:', live.needsRFQ.slice(0,6).map(p=>`${esc(p['PR Ref'])} - ${esc(p['Item / Service Requested'])}`));
  if (key === 'finance') return live.payQueue.length ? list('No-credit payment queue:', live.payQueue.slice(0,6).map(p=>`${esc(p['PR Ref'])} - ${esc(p['Item / Service Requested'])}: ${esc(p['Payment Status'])}`)) : '<div style="margin-top:6px;color:var(--ok);font-size:12px">No payment queue recorded.</div>';
  if (key === 'quotes') return live.quoteQueue.length ? list('Compare/select supplier:', live.quoteQueue.slice(0,6).map(q=>`${esc(q['PR Ref'])} - ${esc(q['Supplier Name'] || q['Supplier ID'])}: ${esc(q['Currency'])} ${esc(q['Total Amount'])}`)) : '<div style="margin-top:6px;color:var(--ok);font-size:12px">No quote decisions pending.</div>';
  if (key === 'stock') return list('GRN / dispatch focus:', [`${live.inventory.length} stock rows available`, `${live.transferQueue.length} GRN/transfer rows pending`]);
  if (key === 'rentals') return live.rentalQueue.length ? list('Rental follow-up:', live.rentalQueue.slice(0,5).map(r=>`${esc(r['Inquiry Ref'])} - ${esc(r.Customer || '')} ${esc(r['Vehicle Type Requested'] || '')}`)) : '<div style="margin-top:6px;color:var(--ok);font-size:12px">No rental follow-up recorded.</div>';
  if (key === 'hr') return live.expSoon14.length ? list('HR/compliance due:', live.expSoon14.slice(0,6).map(e=>`${esc(e.a)} - ${esc(e.k)} ${fmtDays(e.d)}`)) : '<div style="margin-top:6px;color:var(--ok);font-size:12px">No 14-day compliance alerts.</div>';
  if (key === 'strategy') return list('Horizon 1 build list:', ['Asset readiness traffic light and pre-start checklist', 'KPI register: uptime, utilisation, downtime, mobilisation time', 'SOP draft for dispatch, maintenance, PR/RFQ/PO, GRN/transfer', 'Monthly board-ready dashboard notes']);
  if (key === 'close') return '<div style="margin-top:6px;font-size:12px"><em>Close the day only after logging: recovery movement, procurement/finance blockers, dispatch/GRN, rentals, and tomorrow top 3.</em></div>';
  return '';
}
function toggleCheck(i) {
  const s = loadTodayState();
  s.checks = s.checks || {};
  s.checks[i] = !s.checks[i];
  saveTodayState(s);
  renderToday(document.getElementById('main'));
}
function resetToday() {
  if (!confirm('Reset today’s checklist and notes?')) return;
  localStorage.removeItem(todayKey());
  renderToday(document.getElementById('main'));
  toast('Today reset');
}
function closeToday() {
  const s = loadTodayState();
  const intent = s.intent || {};
  const summary = [];
  if (intent.op) summary.push('Op: ' + intent.op);
  if (intent.strat) summary.push('Strat: ' + intent.strat);
  if ((s.tomorrow||[]).filter(Boolean).length) summary.push('Tomorrow: ' + (s.tomorrow||[]).filter(Boolean).join('; '));
  const row = {
    'Date': todayISO(),
    'PRs Received': '', 'Rental Inquiries': '', 'Fleet / Vessel Events': '',
    'Staff Issues': '', 'Director Conversations': '', 'Purchases / Payments': '',
    'Escalations / Critical': '', 'Compliance Actions': '',
    'Notes / Tomorrow': summary.join(' — ')
  };
  const idx = (DATA.daily||[]).findIndex(d => d['Date'] === todayISO());
  if (idx >= 0) DATA.daily[idx] = {...DATA.daily[idx], ...row};
  else { DATA.daily = DATA.daily || []; DATA.daily.push(row); }
  persist();
  activeSection = 'daily';
  localStorage.setItem('wl_ops_active','daily');
  render();
  toast('Daily Log updated for ' + todayISO());
}

function renderMiniChart(id, counts) {
  const el = document.getElementById(id);
  if (!el) return;
  const entries = Object.entries(counts).filter(([,value]) => Number(value) > 0);
  const max = Math.max(1, ...entries.map(([,value]) => Number(value) || 0));
  el.innerHTML = entries.length ? entries.map(([label,value]) => {
    const pct = Math.max(4, Math.round((Number(value) / max) * 100));
    return `<div class="mini-row"><span>${esc(label)}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div><strong>${esc(value)}</strong></div>`;
  }).join('') : '<div class="empty" style="padding:14px">No data yet.</div>';
}

function renderSection(main, section) {
  const sch = SCHEMAS[section];

  main.innerHTML = `
    <div class="bar">

function sectionIntro(section) {
  if (section === 'materials') return `<div class="banner">Procurement flow: phone/text request -> verify specs -> send RFQ -> collect quotations -> approval -> PO -> no-credit payment follow-up with Antrac Finance -> item/invoice collection -> site delivery.</div>`;
  if (section === 'items') return `<div class="banner">Use this as your frequently requested item master: standard specs, usual unit, preferred supplier, last price, lead time and minimum stock.</div>`;
  if (section === 'suppliers') return `<div class="banner">Use this as your supplier memory: what they supply, contact details, payment terms, reliability and typical lead time.</div>`;
  if (section === 'quotes') return quoteRecommendationPanel();
  if (section === 'inventory') return `<div class="banner">After payment and collection, create inventory here from the PR/PO. Keep location as Thilafushi Base, site, supplier or in transit.</div>`;
  if (section === 'transfers') return `<div class="banner">Record GRN when items are received from suppliers, then transfer/dispatch items to Muthaafushi, Bodufinolhu or Thilafushi Base.</div>`;
  return '';
}

function quoteRecommendationPanel() {
  const quotes = DATA.quotes || [];
  const groups = {};
  quotes.forEach(q => {
    const ref = q['PR Ref'] || 'No PR Ref';
    groups[ref] = groups[ref] || [];
    groups[ref].push(q);
  });
  const rows = Object.entries(groups).map(([ref, list]) => {
    const valid = list.filter(q => {
      const compliant = String(q['Compliant?'] || '').toLowerCase();
      const status = String(q['Status'] || '').toLowerCase();
      const amount = Number(String(q['Total Amount'] || '').replace(/,/g,''));
      return amount > 0 && !status.includes('rejected') && !status.includes('expired') && compliant !== 'no';
    }).sort((a,b) => Number(String(a['Total Amount']).replace(/,/g,'')) - Number(String(b['Total Amount']).replace(/,/g,'')));
    const best = valid[0];
    if (!best) return `<li><strong>${esc(ref)}</strong> - ${list.length} quote(s), no compliant priced recommendation yet.</li>`;
    return `<li><strong>${esc(ref)}</strong> - recommend <strong>${esc(best['Supplier Name'] || best['Supplier ID'])}</strong> at ${esc(best['Currency'] || '')} ${esc(best['Total Amount'])}. Check lead time/payment: ${esc(best['Lead Time'] || '')} / ${esc(best['Payment Terms'] || '')}.</li>`;
  });
  return `<div class="banner"><strong>Quote recommendation:</strong> lowest compliant priced quote is recommended by default. Override manually when lead time, warranty, payment terms or supplier reliability matters more.<ul style="margin:6px 0 0 18px">${rows.length ? rows.join('') : '<li>No quotes entered yet.</li>'}</ul></div>`;
}

function renderTable(section) {
  const sch = SCHEMAS[section];
  let rows = (DATA[section] || []).map((r,i) => ({...r, __i: i}));
  if (searchTerm) {
    rows = rows.filter(r => Object.values(r).some(v => String(v||'').toLowerCase().includes(searchTerm)));
  }
  if (filterStatus) rows = rows.filter(r => (r['Status']||'') === filterStatus);
  const ss = sortState[section];
  if (ss) {
    rows.sort((a,b) => {
      const av = String(a[ss.col]||''), bv = String(b[ss.col]||'');
      return ss.dir === 'asc' ? av.localeCompare(bv, undefined, {numeric:true}) : bv.localeCompare(av, undefined, {numeric:true});
    });
  }
  const wrap = document.getElementById('tableWrap');
  if (rows.length === 0) { wrap.innerHTML = '<div class="empty">No records — click <strong>+ Add</strong> to create one.</div>'; return; }
  const cols = sch.columns;
  wrap.innerHTML = `
    <table>
      <thead><tr>${cols.map(c=>`<th onclick="sortBy('${section}','${c.replace(/'/g,"\\'")}')">${esc(c)}${ss&&ss.col===c?(ss.dir==='asc'?' ▲':' ▼'):''}</th>`).join('')}<th></th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr>${cols.map(c=>`<td>${cellRender(c, r[c], r, section)}</td>`).join('')}<td><div class="row-actions">${extraActions(section, r)}<button onclick="openForm('${section}',${r.__i})">Edit</button><button class="del" onclick="deleteRow('${section}',${r.__i})">Del</button></div></td></tr>`).join('')}
      </tbody>
    </table>
  `;
}

function extraActions(section, row) {
  if (section === 'materials') return `<button onclick="createInventoryFromPR(${row.__i})">Stock</button>`;
  if (section === 'inventory') return `<button onclick="createTransferFromStock(${row.__i})">Dispatch</button>`;
  return '';
}

function cellRender(col, v, r, section) {
  v = v == null ? '' : String(v);
  if (!v) return '<span style="color:#cbd5e1">—</span>';
  // Urgency chip
  if (col === 'Urgency') {
    const u = v.toUpperCase();
    if (u === 'CRITICAL') return `<span class="chip crit">${esc(v)}</span>`;
    if (u === 'URGENT') return `<span class="chip warn">${esc(v)}</span>`;
    return `<span class="chip muted">${esc(v)}</span>`;
  }
  // Status chip
  if (col === 'Status' || col === 'Closed?') {
    const s = v.toLowerCase();
    if (s.includes('active') || s.includes('operational') || s.includes('yes') || s.includes('full')) return `<span class="chip ok">${esc(v)}</span>`;
    if (s.includes('ground') || s.includes('out of service')) return `<span class="chip crit">${esc(v)}</span>`;
    if (s.includes('standby') || s.includes('verify') || s.includes('probation')) return `<span class="chip warn">${esc(v)}</span>`;
    return `<span class="chip">${esc(v)}</span>`;
  }
  if (col === 'Rental Eligible?') return v.includes('Yes') ? `<span class="chip ok">${esc(v)}</span>` : `<span class="chip muted">${esc(v)}</span>`;
  if (col === 'Drydocked?') return v.toLowerCase() === 'yes' ? `<span class="chip warn">Yes</span>` : `<span class="chip ok">No</span>`;
  // Expiry highlight
  if (col.includes('Expiry') || col === 'Next Due Date') {
    const d = daysUntil(v);
    if (d !== null && d <= 60) return `<span class="chip ${d<0?'crit':'warn'}">${esc(v)} · ${fmtDays(d)}</span>`;
  }
  if (col === 'Known Issue' && v.includes('VERIFY')) return `<span class="chip warn">${esc(v)}</span>`;
  return esc(v);
}

function sortBy(section, col) {
  const cur = sortState[section];
  sortState[section] = (cur && cur.col === col) ? { col, dir: cur.dir==='asc'?'desc':'asc' } : { col, dir: 'asc' };
  renderTable(section);
}

// ============= FORM (Add/Edit) =============
let formCtx = null;
function nextId(section) {
  const sch = SCHEMAS[section];
  const rows = DATA[section] || [];
  if (sch.key === '#') return rows.length ? Math.max(...rows.map(r=>+r['#']||0)) + 1 : 1;
  if (sch.key === 'Ref') return rows.length ? Math.max(...rows.map(r=>+r['Ref']||0)) + 1 : 1;
  if (sch.key === 'Date') return new Date().toISOString().slice(0,10);
  // Pattern: PREFIX-####
  const existing = rows.map(r => r[sch.key]||'').filter(Boolean);
  const prefixes = {fleet:'WL-HV', recovery:'RC', materials:'WL-PR', items:'ITM', suppliers:'SUP', quotes:'QT', inventory:'STK', transfers:'DOC', vessels:'WL-MV', staff:'WL-EMP', operators:'WL-EMP', prs:'WL-PR', rentals:'WL-RI'};
  const pre = prefixes[section] || 'WL';
  let max = 0;
  existing.forEach(id => { const m = String(id).match(/(\d+)$/); if (m) max = Math.max(max, +m[1]); });
  return `${pre}-${String(max+1).padStart(4,'0')}`;
}

function openForm(section, idx) {
  const sch = SCHEMAS[section];
  const isEdit = idx != null;
  const rec = isEdit ? {...DATA[section][idx]} : Object.fromEntries(sch.fields.map(f=>[f, f===sch.key ? nextId(section) : '']));
  formCtx = { section, idx, rec };
  document.getElementById('modalTitle').textContent = `${isEdit?'Edit':'New'} ${sch.singular}`;
  const grid = document.getElementById('formGrid');
  grid.innerHTML = sch.fields.map(f => {
    const v = rec[f] || '';
    const isLong = f.toLowerCase().includes('note') || f.toLowerCase().includes('summary') || f.toLowerCase().includes('details') || f.toLowerCase().includes('purpose') || f.toLowerCase().includes('spec') || f.toLowerCase().includes('finance') || f.toLowerCase().includes('warranty') || f === 'Crew Assigned' || f === 'Capacity/Notes';
    const isFull = isLong;
    const enums = sch.enums && sch.enums[f];
    let ctrl;
    if (enums) {
      ctrl = `<select name="${esc(f)}"><option value=""></option>${enums.map(o=>`<option ${o===v?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
    } else if (isLong) {
      ctrl = `<textarea name="${esc(f)}">${esc(v)}</textarea>`;
    } else {
      const type = f.toLowerCase().includes('date') || f.toLowerCase().includes('expiry') ? 'date' : 'text';
      const dval = type === 'date' && v ? toIsoDate(v) : v;
      ctrl = `<input type="${type}" name="${esc(f)}" value="${esc(dval)}"/>`;
    }
    return `<label class="${isFull?'full':''}"><span>${esc(f)}</span>${ctrl}</label>`;
  }).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); formCtx = null; }
function saveForm() {
  if (!formCtx) return;
  const { section, idx } = formCtx;
  const sch = SCHEMAS[section];
  const rec = {};
  document.querySelectorAll('#formGrid [name]').forEach(el => { rec[el.name] = el.value.trim(); });
  if (!rec[sch.key]) { alert('Key field "'+sch.key+'" is required.'); return; }
  if (idx == null) DATA[section].push(rec);
  else DATA[section][idx] = rec;
  persist(); closeModal(); render(); toast(`${sch.singular} ${idx==null?'added':'updated'}`);
}

function createInventoryFromPR(idx) {
  const pr = (DATA.materials || [])[idx];
  if (!pr) return;
  DATA.inventory = DATA.inventory || [];
  const stock = {
    'Stock ID': nextId('inventory'),
    'Item Name': pr['Item / Service Requested'] || '',
    'Specs': pr['Specs Needed'] || '',
    'Category': '',
    'Qty On Hand': '',
    'Unit': '',
    'Location': 'Thilafushi Base',
    'Source PR': pr['PR Ref'] || '',
    'PO No.': pr['PO No.'] || '',
    'Supplier': pr['Selected Vendor'] || '',
    'Unit Cost': '',
    'Currency': '',
    'Last GRN': todayISO(),
    'Status': 'Available',
    'Notes': 'Created from procurement workflow. Confirm quantity, unit cost and final location.'
  };
  DATA.inventory.push(stock);
  pr['Status'] = pr['Status'] || 'Items Collected';
  pr['Collection Status'] = pr['Collection Status'] || 'Collected';
  persist();
  activeSection = 'inventory';
  localStorage.setItem('wl_ops_active', activeSection);
  render();
  toast('Inventory row created from PR');
}

function createTransferFromStock(idx) {
  const stock = (DATA.inventory || [])[idx];
  if (!stock) return;
  DATA.transfers = DATA.transfers || [];
  DATA.transfers.push({
    'Doc Ref': nextId('transfers'),
    'Date': todayISO(),
    'Type': 'Transfer - Base to Site',
    'From': stock['Location'] || 'Thilafushi Base',
    'To Site/Base': '',
    'Item Name': stock['Item Name'] || '',
    'Specs': stock['Specs'] || '',
    'Qty': '',
    'Unit': stock['Unit'] || '',
    'Source PR': stock['Source PR'] || '',
    'PO No.': stock['PO No.'] || '',
    'Supplier': stock['Supplier'] || '',
    'Received By': '',
    'Issued By': 'Ali Mushthaq',
    'GRN Status': 'Closed',
    'Transfer Status': 'Pending Dispatch',
    'Notes': 'Created from inventory. Confirm quantity and receiving site/person.'
  });
  persist();
  activeSection = 'transfers';
  localStorage.setItem('wl_ops_active', activeSection);
  render();
  toast('Transfer document created');
}

function deleteRow(section, idx) {
  if (!confirm('Delete this record? This action persists in your browser.')) return;
  DATA[section].splice(idx, 1); persist(); render(); toast('Record deleted');
}
function toIsoDate(s) {
  const d = parseDate(s); if (!d) return '';
  return d.toISOString().slice(0,10);
}

// ============= IMPORT/EXPORT =============
function exportJSON() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `wl-ops-${new Date().toISOString().slice(0,10)}.json`; a.click();
  toast('JSON exported');
}
function exportCSV() {
  if (activeSection === 'dashboard') { toast('Open a section first'); return; }
  const sch = SCHEMAS[activeSection];
  const rows = DATA[activeSection] || [];
  const cols = sch.fields;
  const escCsv = v => { v = v==null?'':String(v); return /[",\n]/.test(v) ? `"${v.replace(/"/g,'""')}"` : v; };
  const csv = [cols.join(',')].concat(rows.map(r => cols.map(c => escCsv(r[c])).join(','))).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `wl-${activeSection}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  toast('CSV exported');
}
function importJSON(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      if (!confirm('This replaces your current portal data. Continue?')) return;
      DATA = upgradeData(obj); persist(); render(); toast('Imported');
    } catch(e) { alert('Invalid JSON: ' + e.message); }
  };
  reader.readAsText(file);
}
function resetData() {
  if (!confirm('Reset to original spreadsheet data? Your edits will be lost.')) return;
  DATA = upgradeData(JSON.parse(JSON.stringify(SEED)));
  persist(); render(); toast('Reset to original');
}

// ============= UTIL =============
function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
